name: Multi-Environment CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging

env:
  AWS_REGION: ap-southeast-2
  AWS_ACCOUNT_ID: 497162053399

jobs:
  # Determine which environment to deploy to
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      ecr-repo: ${{ steps.set-env.outputs.ecr-repo }}
      cluster: ${{ steps.set-env.outputs.cluster }}
      service: ${{ steps.set-env.outputs.service }}
      task-def: ${{ steps.set-env.outputs.task-def }}
    steps:
      - name: Determine Environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "ecr-repo=backend-api-prod" >> $GITHUB_OUTPUT
            echo "cluster=my-node-api-cluster-prod" >> $GITHUB_OUTPUT
            echo "service=node-app-service-prod" >> $GITHUB_OUTPUT
            echo "task-def=ecs-task-def-prod.json" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "ecr-repo=backend-api-staging" >> $GITHUB_OUTPUT
            echo "cluster=my-node-api-cluster-staging" >> $GITHUB_OUTPUT
            echo "service=node-app-service-staging" >> $GITHUB_OUTPUT
            echo "task-def=ecs-task-def-staging.json" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "ecr-repo=backend-api-dev" >> $GITHUB_OUTPUT
            echo "cluster=my-node-api-cluster-dev" >> $GITHUB_OUTPUT
            echo "service=node-app-service-dev" >> $GITHUB_OUTPUT
            echo "task-def=ecs-task-def-dev.json" >> $GITHUB_OUTPUT
          fi

  # Build and test
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>/dev/null || echo "No linter configured"

      - name: Run tests
        run: npm test 2>/dev/null || echo "No tests configured"

  # Deploy to environment
  deploy:
    needs: [determine-environment, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ needs.determine-environment.outputs.ecr-repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Create task definition from template
        env:
          ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ needs.determine-environment.outputs.ecr-repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Replace placeholders in task definition
          ECR_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          sed "s|<IMAGE_URI>|$ECR_IMAGE_URI|g" ecs-task-def-template.json > ecs-task-def-rendered.json
          sed -i "s|<ENVIRONMENT>|$ENVIRONMENT|g" ecs-task-def-rendered.json

      - name: Deploy to Amazon ECS
        run: |
          CLUSTER=${{ needs.determine-environment.outputs.cluster }}
          SERVICE=${{ needs.determine-environment.outputs.service }}
          
          # Register new task definition
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://ecs-task-def-rendered.json \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          echo "Task Definition ARN: $TASK_DEF_ARN"
          
          # Update service
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $TASK_DEF_ARN \
            --region ${{ env.AWS_REGION }}
          
          # Give ECS time to start pulling the image and launching tasks
          sleep 30
          
          # Quick verification that service accepted the update
          UPDATED_TASK_DEF=$(aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' \
            --output text)
          
          if [[ "$UPDATED_TASK_DEF" == *"$TASK_DEF_ARN"* ]]; then
            echo "✅ Service updated with new task definition"
          else
            echo "⚠️ Service may not have updated yet, but deployment triggered"
          fi

      - name: Post deployment verification
        env:
          ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
        run: |
          echo "✅ Deployment to $ENVIRONMENT completed successfully!"
          echo "Cluster: ${{ needs.determine-environment.outputs.cluster }}"
          echo "Service: ${{ needs.determine-environment.outputs.service }}"

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ needs.determine-environment.outputs.environment }}';
            const status = '${{ job.status }}';
            const commitSha = '${{ github.sha }}'.substring(0, 7);
            
            console.log(`Deployment to ${environment}: ${status} (${commitSha})`);
